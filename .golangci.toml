# Configuration file for golangci-lint
# For more options, see https://golangci-lint.run/usage/configuration/

version = 2

[formatters]
enable = [
  "gci",
  "gofmt",
  "gofumpt",
  "goimports"
]

[formatters.settings.gci]
sections = ["standard", "default", "prefix(github.com/kyleking/gh-repo-dashboard)"]

[formatters.settings.gofumpt]
extra-rules = true

[formatters.settings.goimports]
local-prefixes = ["github.com/kyleking/gh-repo-dashboard"]

[linters]
disable = [
  "depguard", # requires allowlist/denylist configuration
  "forbidigo", # requires custom regex configuration
  "gochecknoglobals", # BubbleTea/lipgloss styles use package-level vars
  "goheader", # copyright headers add noise for personal projects
  "wsl" # whitespace linting too nitpicky
]
enable = [
  "asciicheck",
  "bidichk",
  "bodyclose",
  "containedctx",
  "contextcheck",
  "copyloopvar",
  "cyclop",
  "decorder",
  "dogsled",
  "dupl",
  "dupword",
  "durationcheck",
  "err113",
  "errcheck",
  "errchkjson",
  "errname",
  "errorlint",
  "exhaustive",
  "fatcontext",
  "forcetypeassert",
  "funlen",
  "ginkgolinter",
  "gocheckcompilerdirectives",
  "gochecknoinits",
  "gochecksumtype",
  "gocognit",
  "goconst",
  "gocritic",
  "gocyclo",
  "godot",
  "godox",
  "gomoddirectives",
  "gomodguard",
  "goprintffuncname",
  "gosec",
  "gosmopolitan",
  "govet",
  "grouper",
  "iface",
  "importas",
  "inamedparam",
  "ineffassign",
  "interfacebloat",
  "intrange",
  "ireturn", # see linters.settings.ireturn: bubbletea.Model allowed by design
  "lll",
  "loggercheck",
  "maintidx",
  "makezero",
  "mirror",
  "misspell",
  "mnd",
  "musttag",
  "nakedret",
  "nestif",
  "nilerr",
  "nilnil",
  "nlreturn",
  "noctx",
  "nolintlint",
  "nonamedreturns",
  "nosprintfhostport",
  "paralleltest",
  "perfsprint",
  "prealloc",
  "predeclared",
  "promlinter",
  "protogetter",
  "reassign",
  "revive",
  "rowserrcheck",
  "sloglint",
  "spancheck",
  "sqlclosecheck",
  "staticcheck",
  "tagalign",
  "tagliatelle",
  "testableexamples",
  "testifylint",
  "testpackage",
  "thelper",
  "tparallel",
  "unconvert",
  "unparam",
  "unused",
  "usestdlibvars",
  "usetesting",
  "wastedassign",
  "whitespace",
  "wrapcheck",
  "zerologlint"
]

[linters.settings.cyclop]
max-complexity = 15
skip-tests = true

[linters.settings.dupl]
threshold = 100

[linters.settings.errcheck]
check-type-assertions = true
check-blank = true

[linters.settings.exhaustive]
default-signifies-exhaustive = true

[linters.settings.funlen]
lines = 100
statements = 50
ignore-comments = true

[linters.settings.gocognit]
min-complexity = 20

[linters.settings.goconst]
min-len = 3
min-occurrences = 3
ignore-tests = true

[linters.settings.gocritic]
enabled-tags = ["diagnostic", "style", "performance", "experimental", "opinionated"]
disabled-checks = ["whyNoLint"]

[linters.settings.gocyclo]
min-complexity = 15

[linters.settings.godot]
scope = "declarations"
capital = true

[linters.settings.gomodguard]
blocked.modules = []

[linters.settings.govet]
enable-all = true
# fieldalignment reorders struct fields for tighter packing; disabled because
# reordering exported struct fields breaks the many positional struct literals
# in this codebase's table-driven tests, for a marginal memory win.
disable = ["shadow", "fieldalignment"]

[linters.settings.ireturn]
# bubbletea's Elm architecture requires Update-family methods to return tea.Model
allow = ["error", "empty", "stdlib", "charm\\.land/bubbletea/v2\\.Model"]

[linters.settings.lll]
line-length = 120
tab-width = 4

[linters.settings.misspell]
locale = "US"

[linters.settings.mnd]
ignored-functions = ["make", "strconv.*"]

[linters.settings.nakedret]
max-func-lines = 30

[linters.settings.nestif]
min-complexity = 5

[linters.settings.nlreturn]
block-size = 2

[linters.settings.nolintlint]
allow-unused = false
require-explanation = true
require-specific = true

[linters.settings.revive]
enable-all-rules = false
rules = [
  {name = "atomic"},
  {name = "blank-imports"},
  {name = "bool-literal-in-expr"},
  {name = "call-to-gc"},
  {name = "confusing-naming"},
  {name = "constant-logical-expr"},
  {name = "context-as-argument"},
  {name = "context-keys-type"},
  {name = "defer"},
  {name = "dot-imports"},
  {name = "early-return"},
  {name = "empty-block"},
  {name = "empty-lines"},
  {name = "error-naming"},
  {name = "error-return"},
  {name = "error-strings"},
  {name = "errorf"},
  {name = "exported"},
  {name = "if-return"},
  {name = "import-shadowing"},
  {name = "increment-decrement"},
  {name = "indent-error-flow"},
  {name = "modifies-parameter"},
  {name = "modifies-value-receiver"},
  {name = "package-comments"},
  {name = "range"},
  {name = "range-val-address"},
  {name = "range-val-in-closure"},
  {name = "receiver-naming"},
  {name = "redefines-builtin-id"},
  {name = "string-of-int"},
  {name = "struct-tag"},
  {name = "superfluous-else"},
  {name = "time-equal"},
  {name = "time-naming"},
  {name = "unexported-naming"},
  {name = "unexported-return"},
  {name = "unnecessary-stmt"},
  {name = "unreachable-code"},
  {name = "unused-parameter"},
  {name = "unused-receiver"},
  {name = "use-any"},
  {name = "useless-break"},
  {name = "var-declaration"},
  {name = "var-naming"},
  {name = "waitgroup-by-value"}
]

[linters.settings.staticcheck]
checks = ["all", "-ST1000"]

[linters.settings.tagliatelle]
case.rules.json = "snake"
case.rules.yaml = "kebab"

[[linters.exclusions.rules]]
# These structs decode `gh`/GitHub API JSON, which is camelCase on the wire;
# the tags must match the API's field names, not our naming convention.
path = "internal/github/(pr|workflow)\\.go"
linters = ["tagliatelle"]

[[linters.exclusions.rules]]
# Model/KeyMap and the domain value types (RepoSummary, BranchInfo, PRInfo, etc.) are
# passed/received by value throughout: Bubble Tea's Elm-style Update needs Model by value,
# and the domain types are frequently read out of map[string]T values, which aren't
# addressable in Go, so switching their methods to pointer receivers would break those
# call sites. Not worth the ripple for structs under ~1.6KB.
path = "internal/app/(app|keymap|command|state|textobject|view|update)(_test)?\\.go|internal/models/(branch|pr|repo)\\.go|internal/ui/styles/styles\\.go"
linters = ["gocritic"]
text = "hugeParam"

[linters.settings.testifylint]
enable-all = true

[linters.settings.unparam]
check-exported = true

[linters.settings.wrapcheck]
ignoreSigs = [
  ".Errorf(",
  "errors.New(",
  "errors.Unwrap(",
  "errors.Join(",
  ".Wrap(",
  ".Wrapf(",
  ".WithMessage(",
  ".WithMessagef(",
  ".WithStack("
]

[run]
timeout = "5m"
