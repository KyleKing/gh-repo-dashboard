[tasks.bench]
description = "Run benchmarks"
run = "go test -bench=. -benchmem -run=^$ ./..."

[tasks."brew:sha"]
description = "Print SHA256 for Homebrew formula (run after release)"
run = """
echo "Download binaries from the latest release and run:"
echo "  shasum -a 256 gh-repo-dashboard-darwin-arm64 gh-repo-dashboard-darwin-amd64 gh-repo-dashboard-linux-arm64 gh-repo-dashboard-linux-amd64"
echo ""
echo "Then update Formula/gh-repo-dashboard.rb with the SHA256 values and version."
"""

[tasks.build]
description = "Build binary"
run = "go build -v -o gh-repo-dashboard ./cmd/gh-repo-dashboard"

[tasks.ci]
description = "Run all checks (used in GitHub Actions)"
run = ["go test -v -coverprofile=coverage.out ./...", "go test -tags=golden -run TestGolden ./internal/app/", "go build -v -o gh-repo-dashboard ./cmd/gh-repo-dashboard"]

[tasks.clean]
description = "Clean build artifacts"
run = "rm -f coverage.out"

[tasks.demo]
description = "Generate VHS demo recordings"
run = 'find . -name "*.tape" -not -path "./.git/*" -exec vhs {} \;'
depends = ["build"]

[tasks."docs:usage"]
description = "Regenerate docs/USAGE.md from command fixtures"
run = "go test ./internal/app/ -run TestUsageDocsCurrent -update-docs"

[tasks.format]
description = "Format code with golangci-lint and golines"
run = ["golangci-lint run --fix ./...", "golines -w ."]

[tasks.hooks]
description = "Run git hooks"
run = "hk fix --quiet"

[tasks.lint]
description = "Run linter"
run = "golangci-lint run ./..."

[tasks.test]
description = "Run tests with coverage"
run = "go test -coverprofile=coverage.out ./..."

[tasks."test:golden"]
description = "Run golden snapshot tests"
run = "go test -tags=golden -run TestGolden ./internal/app/"

[tasks."test:golden-update"]
description = "Regenerate golden snapshots"
run = "go test -tags=golden -run TestGolden ./internal/app/ -update"

[tasks."test:coverage-min"]
description = "Verify minimum coverage threshold (70%)"
run = '''
go test -coverprofile=coverage.out -coverpkg=./... ./...
coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
echo "Current coverage: ${coverage}%"
if (( $(awk "BEGIN {print ($coverage < 70)}") )); then
    echo "Coverage ${coverage}% is below 70% minimum threshold"
    exit 1
fi
'''

[tasks."test:view-coverage"]
description = "View coverage report in browser"
run = "go tool cover -html=coverage.out"
